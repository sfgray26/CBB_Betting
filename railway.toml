# Railway Deployment Configuration

[build]
builder = "nixpacks"

[build.nixpacks]
python_version = "3.11"

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.healthcheck]
path = "/health"
timeout = 30
