# Railway Deployment Configuration
# Explicit configuration to ensure dependencies install correctly

[build]
builder = "nixpacks"

[build.nixpacks]
# Explicitly use Python 3.11
python_version = "3.11"

# Install phase - ensure pip is up to date and install requirements
[build.nixpacks.phases.setup]
# chromium-browser deps needed for playwright browser automation (EvanMiya scraper)
nixPkgs = ["python311", "python311Packages.pip", "gcc", "chromium", "glib", "nss", "nspr", "atk", "cups", "dbus", "expat"]

[build.nixpacks.phases.install]
cmds = [
  "pip install --upgrade pip setuptools wheel",
  "pip install -r requirements.txt",
  "playwright install chromium --with-deps || true"
]

[deploy]
startCommand = "python scripts/preflight_check.py && uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.healthcheck]
path = "/health"
timeout = 30

[[deploy.regions]]
region = "us-west1"
