name: Deploy to Railway

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------------------------------------------------------------------------
  # Frontend type check + safety validation (no DB needed)
  # Inspired by: Anthropic "Building a C Compiler with 16 Agents"
  # "The test harness prevents agents from solving the wrong problem."
  # ---------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: cd frontend && npm ci

    - name: TypeScript type check
      run: cd frontend && npx tsc --noEmit
      # Authoritative null-safety check — catches type errors the grep script cannot

    - name: Frontend safety validator (7-point checklist)
      run: |
        chmod +x scripts/validate_frontend.sh
        ./scripts/validate_frontend.sh
      # Supplementary signal check — catches runtime anti-patterns

  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Set up test database
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_cbb_edge
        PGPASSWORD: postgres
      run: |
        psql -h localhost -U postgres -c "CREATE DATABASE test_cbb_edge;"
        python scripts/init_db.py
    
    - name: Syntax check core files
      run: |
        python -m py_compile backend/main.py backend/betting_model.py backend/services/analysis.py backend/services/odds.py

    - name: Run tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_cbb_edge
        API_KEY_USER1: test_key_12345678901234567890
        ENVIRONMENT: development
      run: |
        pytest tests/ -v --tb=short --cov=backend

  deploy:
    runs-on: ubuntu-latest
    needs: [test, frontend]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Railway CLI
      run: npm install -g @railway/cli
    
    - name: Deploy to Railway
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: railway up
