plan_id: fantasy-recovery-2026-04
objective: |
  Architectural cleanup and forward roadmap for fantasy baseball platform. Restructure bloated documentation, 
  recover data quality from 0-33% population rates, build missing ROW projection pipeline, expand rolling stats 
  from 9/18 to 18/18 categories, and establish clear UI enablement gate.
created_at: '2026-04-21T20:00:00-05:00'
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 42
  risk_score: high

tldr: |
  Fantasy baseball platform has route availability (95/99 checks pass) but suffers critical data quality issues:
  roster enrichment 0%, waiver matchup data hollow, rolling stats only 9/18 categories, ROW projection pipeline
  missing entirely. This plan executes architectural cleanup in 10 waves: (1) document restructure, (2) deploy
  uncommitted fixes, (3) diagnose data ingestion, (4-7) build missing features (ROW pipeline, rolling stats,
  ROS projections, games-remaining), (8) UI readiness gate, (9-10) Phase 5 UI execution. Estimated 60-90 days
  to unblock Phase 5.

open_questions:
  - Is PlayerIDMapping table empty due to ingestion failure or missing data source?
  - What is the actual freshness of player_rolling_stats in production (stale by how many days)?
  - Should ownership_pct ingestion source from Yahoo API or different provider?
  - Is K_P mislabeling (carries wins instead of strikeouts) a schema bug or data transformation bug?

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: ROW projection pipeline implementation reveals Yahoo API does not provide games-remaining-this-week data
      likelihood: medium
      impact: critical
      mitigation: Design fallback using MLB Stats API schedule endpoint; pre-research Yahoo scoreboard API structure before Wave 4
    - scenario: Rolling stats expansion blocked by missing upstream Yahoo data for W, L, HR_P, NSV categories
      likelihood: medium
      impact: high
      mitigation: HANDOFF.md already notes these 4 categories deferred awaiting upstream data; document exact Yahoo API gap in Wave 3
    - scenario: PlayerIDMapping empty because BDL player ID ingestion never built, not just broken
      likelihood: high
      impact: high
      mitigation: Audit backend/services/daily_ingestion.py for missing BDL player sync job; may need new Wave 3 task to build it
    - scenario: Data quality issues cascade - fixing one enrichment reveals 3 more missing joins
      likelihood: high
      impact: medium
      mitigation: Wave 3 diagnosis tasks must produce comprehensive data lineage audit before Wave 4 begins
    - scenario: UI readiness gate (Wave 8) fails because enrichment fixes don't persist across Yahoo API cache refreshes
      likelihood: medium
      impact: high
      mitigation: Add cache invalidation validation in Wave 2; verify enrichment survives 24-hour window
  assumptions:
    - HANDOFF.md bloat is primarily historical session logs, not critical operational detail
    - Uncommitted fixes from Apr 21 sessions are regression-tested and safe to deploy
    - Yahoo API provides sufficient data for ROW projections (games-remaining inference possible)
    - pybaseball/Statcast integration for advanced stats remains out of scope for data quality recovery
    - Phase 5 UI can proceed with 50% READY / 30% MISSING threshold (not 100% complete)
    - 60-90 day timeline acceptable for production-grade data quality

implementation_specification:
  code_structure: |
    Document restructure: Move session logs to memory/, architect decisions to tasks/, layer detail to docs/ARCHITECTURE.md.
    Keep HANDOFF.md focused on §1 Mission, §2 Defects, §3 Phase Status, §4 Data Quality Dashboard, §5 Delegation, §6 References.
    
    Data quality: Fix ingestion in backend/services/daily_ingestion.py, enrichment in backend/services/player_mapper.py,
    API orchestration in backend/routers/fantasy.py. Each fix must have regression test in tests/.
    
    ROW pipeline: New module backend/services/row_projector.py (or extend existing if found). Input: rolling stats,
    season stats, games-remaining. Output: 18-category rest-of-week projections. Wire into scoreboard orchestrator.
    
    Rolling stats: Expand backend/services/rolling_stats.py ingestion from 9 to 18 categories. Add missing batting (R, TB),
    pitching (W, L, HRA, K_P, QS, NSV). Verify Yahoo API provides these categories before implementation.
  affected_areas:
    - HANDOFF.md - restructure from 500 lines to 150 lines
    - memory/ - new session log files (YYYY-MM-DD.md)
    - tasks/architect_review.md - new file for architectural decisions
    - docs/ARCHITECTURE.md - layer status detail relocation
    - backend/services/daily_ingestion.py - PlayerIDMapping ingestion diagnosis
    - backend/services/player_mapper.py - enrichment validation
    - backend/services/row_projector.py - new ROW projection pipeline (if missing)
    - backend/services/rolling_stats.py - expand from 9/18 to 18/18 categories
    - backend/routers/fantasy.py - API contract field additions (MS-5, MS-6, MS-7)
    - backend/schemas.py - Pydantic models for new fields
    - tests/ - regression tests for all data quality fixes
  component_details:
    - component: HANDOFF.md
      responsibility: Current mission state, defects, phase status, delegation bundles. Target 150 lines, zero session logs.
      interfaces:
        - §1 Mission Accomplished (what was done in latest session)
        - §2 Current State (deploy state, phase progress, open defects)
        - §3 Delegation Bundles (one per agent with verbatim prompts)
        - §4 References (links to memory/, tasks/, docs/)
    - component: memory/YYYY-MM-DD.md
      responsibility: Session-specific operational logs, git commit trails, tactical debugging notes
      interfaces:
        - Daily session log format (date, agent, commits, file changes, validation)
    - component: ROW Projection Pipeline
      responsibility: Compute rest-of-week projections per player for all 18 categories
      interfaces:
        - Input: rolling_stats (7d/14d/30d), season_stats, games_remaining_this_week
        - Output: ROWProjectionResult (18 categories: R, H, HR_B, RBI, K_B, TB, NSB, AVG, OPS, W, L, HR_P, K_P, QS, NSV, ERA, WHIP, K_9)
        - Wire into: GET /api/fantasy/scoreboard (fields MS-5, MS-6, MS-7)
    - component: Rolling Stats Expansion
      responsibility: Expand ingestion from 9/18 to 18/18 categories
      interfaces:
        - Input: Yahoo API player stats (verify W, L, HR_P, NSV availability)
        - Output: player_rolling_stats table (all 18 categories populated)
        - Expose via: GET /api/fantasy/roster (rolling_7d, rolling_14d, rolling_30d fields)
    - component: PlayerIDMapping Ingestion
      responsibility: Populate PlayerIDMapping table with Yahoo-to-BDL-to-MLBAM joins
      interfaces:
        - Input: Yahoo player_key, BDL player API, MLB Stats API
        - Output: PlayerIDMapping table rows (yahoo_key, bdl_player_id, mlbam_id)
        - Expose via: GET /api/fantasy/roster (bdl_player_id, mlbam_id, game_context fields)
  dependencies:
    - component: ROW Projection Pipeline
      relationship: Requires rolling_stats expansion (Wave 5) to provide 18/18 input categories
    - component: UI Readiness Gate
      relationship: Blocks Phase 5 execution until ROW pipeline, rolling stats, ROS projections operational
    - component: Document Restructure
      relationship: Independent - can run in parallel with data quality work
  integration_points:
    - backend/routers/fantasy.py GET /api/fantasy/scoreboard - add MS-5, MS-6, MS-7 fields from ROW projections
    - backend/routers/fantasy.py GET /api/fantasy/roster - expose rolling_7d/14d/30d, ros_projection, row_projection
    - backend/routers/fantasy.py GET /api/fantasy/waiver - expose games_remaining_this_week in filters
    - backend/services/dashboard_service.py - orchestrate ROW projection calls
    - backend/services/daily_ingestion.py - add PlayerIDMapping sync job if missing

